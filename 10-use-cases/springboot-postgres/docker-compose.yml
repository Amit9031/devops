version: "3.9"

# Java Spring Boot + PostgreSQL Stack
# Usage: docker compose up -d
# API: http://localhost:8080

services:
  postgres:
    image: postgres:15-alpine
    container_name: springboot-db
    environment:
      POSTGRES_USER: ${DB_USER:-springuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-springpassword}
      POSTGRES_DB: ${DB_NAME:-springdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-springuser} -d ${DB_NAME:-springdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-springdb}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-springuser}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-springpassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - app-net
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
